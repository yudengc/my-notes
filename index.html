<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>我的个人笔记11</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="description" content="Description">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  <!-- 使用 Vue 主题 -->
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/themes/vue.css">
  <!-- 可选：其他主题如 'dark', 'buble', 'pure' -->
</head>
<body>
  <div id="app"></div>
  <script>
    window.$docsify = {
      name: '📝 我的笔记', // 左上角标题
      repo: 'yudengc/my-notes', // 如果想显示右上角 GitHub 图标，填入 '用户名/仓库名'
      loadSidebar: true, // 开启侧边栏导航
      subMaxLevel: 2,    // 目录最大层级
      auto2top: true,    // 切换页面自动回到顶部
      search: {          // 开启全文搜索
        maxAge: 86400000, // 过期时间
        paths: [], 
        placeholder: '搜索笔记...',
        noData: '找不到结果',
        depth: 4
      },
      pagination: {      // 开启上一页/下一页
        previousText: '上一篇',
        nextText: '下一篇',
        crossChapter: true
      }
    }
  </script>
  <!-- Docsify 核心脚本 -->
  <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>
  <!-- 搜索插件 -->
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>
  <!-- 分页插件 -->
  <script src="//cdn.jsdelivr.net/npm/docsify-pagination/dist/docsify-pagination.min.js"></script>
  <!-- 表情支持 -->
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/emoji.min.js"></script>
  <!-- 图片缩放 -->
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/zoom-image.min.js"></script>
</body>
</html>
